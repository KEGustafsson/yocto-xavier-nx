# meta-boat layer configuration
BBPATH .= ":${LAYERDIR}"
BBFILES += "${LAYERDIR}/recipes-*/*/*.bb ${LAYERDIR}/recipes-*/*/*.bbappend"

BBFILE_COLLECTIONS += "boat"
BBFILE_PATTERN_boat = "^${LAYERDIR}/"
BBFILE_PRIORITY_boat = "10"

LAYERDEPENDS_boat = "core tegra"
LAYERSERIES_COMPAT_boat = "kirkstone"

# meta-boat pulls marine software from the meta-openembedded sublayers
# (gpsd, can-utils, mosquitto, chrony, nodejs, ...). They are recommended,
# not hard dependencies, so a minimal build without them still parses.
LAYERRECOMMENDS_boat = "openembedded-layer networking-layer meta-python"
